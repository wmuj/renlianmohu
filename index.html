<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人脸模糊工具</title>
<meta name="description" content="一键模糊照片中的人脸，本地处理，保护隐私">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f6fa;
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .top-bar {
    background: #2563eb;
    color: white;
    padding: 18px 24px;
  }
  .top-bar h1 { font-size: 20px; font-weight: 700; }
  .top-bar p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Upload */
  .upload-box {
    background: #2563eb;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    position: relative;
    color: white;
    border: 3px dashed rgba(255,255,255,0.4);
    transition: background 0.2s;
  }
  .upload-box:hover { background: #1d4ed8; }
  .upload-box.drag-over { background: #1d4ed8; border-color: white; }
  .upload-box input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    width: 64px; height: 64px; margin: 0 auto 16px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .upload-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .select-btn {
    display: inline-block;
    padding: 10px 28px;
    background: white;
    color: #2563eb;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none;
  }

  /* Settings */
  .settings-card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .settings-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #374151;
  }
  .field {
    margin-bottom: 20px;
  }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 8px;
  }
  .field-label .info-icon {
    width: 16px; height: 16px;
    background: #e5e7eb;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #6b7280;
    cursor: help;
    position: relative;
  }
  .field-label .info-icon:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 400;
    white-space: nowrap;
    z-index: 10;
  }
  .field input[type="number"] {
    width: 100%;
    max-width: 200px;
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    color: #1f2937;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input[type="number"]:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .field-hint {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 4px;
  }

  /* Start Button */
  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 12px 32px;
    background: #f59e0b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #d97706; }
  .start-btn:disabled {
    background: #d1d5db;
    cursor: not-allowed;
  }

  /* Status */
  .status {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .status.show { display: flex; }
  .status.loading { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .spinner {
    width: 16px; height: 16px;
    border: 2.5px solid #bfdbfe;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Preview */
  .preview-section {
    display: none;
    margin-top: 20px;
  }
  .preview-section.show { display: block; }
  .preview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 600px) { .preview-grid { grid-template-columns: 1fr; } }
  .preview-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .preview-header {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    border-bottom: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .face-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #fef3c7;
    color: #d97706;
    font-weight: 600;
  }
  .done-badge {
    font-size: 11px;
    color: #16a34a;
    font-weight: 600;
  }
  .preview-card img, .preview-card canvas {
    width: 100%;
    display: block;
    max-height: 420px;
    object-fit: contain;
    background: #f9fafb;
  }

  /* Download */
  .result-actions {
    display: none;
    margin-top: 16px;
    gap: 10px;
  }
  .result-actions.show { display: flex; flex-wrap: wrap; }
  .dl-btn {
    padding: 10px 24px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .dl-btn:hover { background: #15803d; }
  .reset-btn {
    padding: 10px 24px;
    background: white;
    color: #374151;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .reset-btn:hover { background: #f9fafb; }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="container" style="padding:0;">
    <h1>模糊照片中的人脸</h1>
    <p>一键保护隐私并保持匿名 · 完全本地处理，不上传</p>
  </div>
</div>

<div class="container">

  <!-- Upload -->
  <div class="upload-box" id="uploadBox">
    <input type="file" id="fileInput" accept="image/*">
    <div class="upload-icon">☁️</div>
    <h3>拖放文件到此处或点击上传</h3>
    <span class="select-btn">选择文件</span>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="settings-title">⚙ 设置</div>

    <div class="field">
      <div class="field-label">
        模糊强度
        <span class="info-icon" data-tip="数值越大，模糊效果越强">?</span>
      </div>
      <input type="number" id="blurStrength" value="3" min="1" max="20" step="1">
    </div>

    <div class="field">
      <div class="field-label">
        模糊范围
        <span class="info-icon" data-tip="人脸周围额外扩展的区域，0-100">?</span>
      </div>
      <input type="number" id="blurRange" value="0" min="0" max="100" placeholder="0 - 100" step="5">
      <div class="field-hint">0 - 100</div>
    </div>
  </div>

  <!-- Start -->
  <button class="start-btn" id="startBtn" disabled>开始 →</button>

  <!-- Status -->
  <div class="status" id="statusBar">
    <div class="spinner" id="spinner" style="display:none;"></div>
    <span id="statusText"></span>
  </div>

  <!-- Preview -->
  <div class="preview-section" id="previewSection">
    <div class="preview-grid">
      <div class="preview-card">
        <div class="preview-header">
          原图
          <span id="faceBadge" class="face-badge"></span>
        </div>
        <img id="previewImg" alt="原图">
      </div>
      <div class="preview-card">
        <div class="preview-header">
          处理结果
          <span id="doneBadge" class="done-badge"></span>
        </div>
        <canvas id="resultCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Result Actions -->
  <div class="result-actions" id="resultActions">
    <button class="dl-btn" id="downloadBtn">⬇ 下载结果</button>
    <button class="reset-btn" id="resetBtn">↺ 重新上传</button>
  </div>

  <div class="footer">
    本地 AI 处理 · 图片不上传任何服务器 · 无限次使用
  </div>

</div>

<script type="module">
import vision from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/+esm';
const { FaceDetector, FilesetResolver } = vision;

let detector = null;
let currentImage = null;

const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
const startBtn = document.getElementById('startBtn');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const statusBar = document.getElementById('statusBar');
const statusText = document.getElementById('statusText');
const spinnerEl = document.getElementById('spinner');
const previewSection = document.getElementById('previewSection');
const previewImg = document.getElementById('previewImg');
const resultCanvas = document.getElementById('resultCanvas');
const faceBadge = document.getElementById('faceBadge');
const doneBadge = document.getElementById('doneBadge');
const resultActions = document.getElementById('resultActions');

function setStatus(type, text, showSpinner) {
  statusBar.className = 'status show ' + type;
  statusText.textContent = text;
  spinnerEl.style.display = showSpinner ? 'block' : 'none';
}
function hideStatus() { statusBar.className = 'status'; }

async function loadDetector() {
  if (detector) return;
  setStatus('loading', '正在加载 Google MediaPipe 人脸检测模型…', true);
  try {
    const filesetResolver = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm'
    );
    detector = await FaceDetector.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
        delegate: 'GPU'
      },
      runningMode: 'IMAGE',
      minDetectionConfidence: 0.3
    });
    setStatus('success', '✓ 模型加载完成');
    setTimeout(hideStatus, 2000);
  } catch (e) {
    // Fallback: try CPU if GPU fails
    try {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm'
      );
      detector = await FaceDetector.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
          delegate: 'CPU'
        },
        runningMode: 'IMAGE',
        minDetectionConfidence: 0.3
      });
      setStatus('success', '✓ 模型加载完成');
      setTimeout(hideStatus, 2000);
    } catch (e2) {
      setStatus('error', '模型加载失败：' + e2.message);
    }
  }
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('error', '请选择图片文件');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      previewImg.src = e.target.result;
      previewSection.className = 'preview-section show';
      faceBadge.textContent = '';
      doneBadge.textContent = '';
      resultCanvas.getContext('2d').clearRect(0, 0, resultCanvas.width, resultCanvas.height);
      startBtn.disabled = false;
      resultActions.className = 'result-actions';
      loadDetector();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag-over'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
uploadBox.addEventListener('drop', e => {
  e.preventDefault();
  uploadBox.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

resetBtn.addEventListener('click', () => {
  currentImage = null;
  fileInput.value = '';
  previewSection.className = 'preview-section';
  startBtn.disabled = true;
  resultActions.className = 'result-actions';
  hideStatus();
});

startBtn.addEventListener('click', async () => {
  if (!currentImage || !detector) return;
  startBtn.disabled = true;
  setStatus('loading', '正在检测人脸…', true);

  try {
    const result = detector.detect(currentImage);
    const detections = result.detections;
    const count = detections.length;
    faceBadge.textContent = count > 0 ? `${count} 张人脸` : '';

    if (count === 0) {
      setStatus('error', '未检测到人脸，请更换图片');
      startBtn.disabled = false;
      return;
    }

    setStatus('loading', `正在模糊 ${count} 张人脸…`, true);

    const canvas = resultCanvas;
    const ctx = canvas.getContext('2d');
    canvas.width = currentImage.naturalWidth;
    canvas.height = currentImage.naturalHeight;
    ctx.drawImage(currentImage, 0, 0);

    const strength = Math.max(1, Math.min(20, parseInt(document.getElementById('blurStrength').value) || 3));
    const range = Math.max(0, Math.min(100, parseInt(document.getElementById('blurRange').value) || 0));
    const blurPx = strength * 5;
    const padding = range / 100;

    for (const det of detections) {
      const bb = det.boundingBox;
      const x = bb.originX;
      const y = bb.originY;
      const w = bb.width;
      const h = bb.height;

      const px = w * padding;
      const py = h * padding;
      const bx = Math.max(0, x - px);
      const by = Math.max(0, y - py);
      const bw = Math.min(canvas.width - bx, w + px * 2);
      const bh = Math.min(canvas.height - by, h + py * 2);

      ctx.save();
      ctx.beginPath();
      ctx.ellipse(bx + bw / 2, by + bh / 2, bw / 2, bh / 2, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.filter = `blur(${blurPx}px)`;
      for (let j = 0; j < 3; j++) {
        ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
      }
      ctx.filter = 'none';
      ctx.restore();
    }

    doneBadge.textContent = '✓ 完成';
    setStatus('success', `✓ 已模糊 ${count} 张人脸`);
    resultActions.className = 'result-actions show';
    startBtn.disabled = false;
  } catch (err) {
    setStatus('error', '处理出错：' + err.message);
    startBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  link.download = `blurred_${ts}.png`;
  link.href = resultCanvas.toDataURL('image/png');
  link.click();
});

// Start loading model immediately
loadDetector();
</script>
</body>
</html>
