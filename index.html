<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceBlur · 人脸模糊工具</title>
<meta name="description" content="一键模糊照片中的人脸，完全本地AI处理，保护隐私">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="lib/face-api.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#09090f;--card:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.07);
    --accent:#7c5cfc;--accent2:#a78bfa;--accent-glow:rgba(124,92,252,0.12);
    --text:#f0f0f5;--text2:#a0a3b8;--text3:#6b6e85;
    --green:#2dd4a8;--orange:#fb923c;--red:#f87171;--r:14px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;overflow-x:hidden}
  .bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .bg .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12}
  .bg .orb-1{width:520px;height:520px;background:#7c5cfc;top:-120px;left:-80px;animation:orbit 25s ease-in-out infinite}
  .bg .orb-2{width:440px;height:440px;background:#06b6d4;bottom:-100px;right:-60px;animation:orbit 25s ease-in-out infinite reverse}
  .bg .orb-3{width:300px;height:300px;background:#f472b6;top:40%;left:60%;animation:orbit 20s ease-in-out infinite 5s}
  @keyframes orbit{0%,100%{transform:translate(0,0)}33%{transform:translate(50px,30px)}66%{transform:translate(-40px,50px)}}
  .bg .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:64px 64px}
  .wrap{position:relative;z-index:1;max-width:840px;margin:0 auto;padding:40px 20px 60px}
  .hd{display:flex;align-items:center;gap:14px;margin-bottom:36px;animation:fadeUp .5s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .hd-icon{width:48px;height:48px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#7c5cfc,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 32px rgba(124,92,252,.35)}
  .hd h1{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(90deg,#f0f0f5 30%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hd p{font-size:13px;color:var(--text3);margin-top:2px}
  .hd-tag{margin-left:auto;font-size:11px;padding:5px 12px;border-radius:20px;background:rgba(45,212,168,.08);color:var(--green);border:1px solid rgba(45,212,168,.18);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  .card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--r);transition:border-color .25s}
  .card:hover{border-color:rgba(255,255,255,.1)}
  .upload{padding:52px 24px;text-align:center;cursor:pointer;position:relative;overflow:hidden;animation:fadeUp .5s ease .05s both}
  .upload::before{content:'';position:absolute;inset:1px;border:2px dashed rgba(124,92,252,.18);border-radius:var(--r);pointer-events:none;transition:.3s}
  .upload:hover::before,.upload.drag-over::before{border-color:var(--accent);background:rgba(124,92,252,.03)}
  .upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .upload-circle{width:72px;height:72px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,var(--accent-glow),rgba(124,92,252,.22));display:flex;align-items:center;justify-content:center;font-size:28px;position:relative}
  .upload-circle::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px dashed rgba(124,92,252,.25);animation:spin 15s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .upload h3{font-size:15px;font-weight:600;margin-bottom:4px}
  .upload .sub{font-size:12px;color:var(--text3);margin-bottom:16px}
  .upload-cta{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;background:linear-gradient(135deg,var(--accent),#9b7fff);color:#fff;border-radius:10px;font-size:13px;font-weight:600;pointer-events:none;box-shadow:0 4px 20px rgba(124,92,252,.3)}
  .settings{margin-top:14px;padding:22px 24px;animation:fadeUp .5s ease .1s both}
  .stitle{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:6px}
  .stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--card-border),transparent)}
  .srow{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:520px){.srow{grid-template-columns:1fr}}
  .fld-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
  .tip-dot{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.06);display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);cursor:help;position:relative}
  .tip-dot:hover::after{content:attr(data-t);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:#222;color:#ddd;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:400;white-space:nowrap;z-index:9}
  .fld input[type="number"]{width:100%;max-width:180px;padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
  .fld input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .fld-hint{font-size:11px;color:var(--text3);margin-top:4px}
  .bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;animation:fadeUp .5s ease .15s both}
  .btn{padding:11px 28px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:all .2s}
  .btn:active{transform:scale(.97)}
  .btn-go{background:linear-gradient(135deg,var(--accent),#9b7fff);color:#fff;box-shadow:0 4px 20px rgba(124,92,252,.25)}
  .btn-go:hover{box-shadow:0 6px 28px rgba(124,92,252,.35);transform:translateY(-1px)}
  .btn-go:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none}
  .btn-dl{background:rgba(45,212,168,.1);color:var(--green);border:1px solid rgba(45,212,168,.18)}
  .btn-dl:hover{background:rgba(45,212,168,.17)}
  .btn-reset{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--card-border)}
  .btn-reset:hover{border-color:rgba(255,255,255,.12)}
  .st{margin-top:12px;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;display:none;align-items:center;gap:9px;animation:fadeUp .25s ease}
  .st.show{display:flex}
  .st.loading{background:var(--accent-glow);border:1px solid rgba(124,92,252,.12);color:var(--accent2)}
  .st.success{background:rgba(45,212,168,.06);border:1px solid rgba(45,212,168,.12);color:var(--green)}
  .st.error{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.12);color:var(--red)}
  .sp{width:14px;height:14px;border:2px solid rgba(124,92,252,.2);border-top-color:var(--accent2);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
  .preview{display:none;margin-top:16px;gap:14px}
  .preview.show{display:grid;grid-template-columns:1fr 1fr;animation:fadeUp .35s ease}
  @media(max-width:600px){.preview.show{grid-template-columns:1fr}}
  .pbox{overflow:hidden}
  .pbox-hd{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.5px}
  .pbox img,.pbox canvas{width:100%;display:block;max-height:400px;object-fit:contain;background:#07070d}
  .tag-face{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(251,146,60,.08);color:var(--orange);border:1px solid rgba(251,146,60,.15);font-weight:600;text-transform:none;letter-spacing:0}
  .tag-done{font-size:10px;color:var(--green);font-weight:600;text-transform:none;letter-spacing:0}
  .result{display:none;margin-top:14px;gap:10px}
  .result.show{display:flex;flex-wrap:wrap}
  /* ── 进度条 ── */
  .prog-wrap{display:none;margin-top:10px;animation:fadeUp .25s ease}
  .prog-wrap.show{display:block}
  .prog-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
  .prog-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#a78bfa);width:0%;transition:width .3s ease}
  .prog-label{font-size:11px;color:var(--text3);margin-top:5px;text-align:right}
  .ft{margin-top:48px;padding-bottom:24px;text-align:center;font-size:11px;color:var(--text3);letter-spacing:.3px;line-height:2}
  .ft a{color:var(--accent2);text-decoration:none;border-bottom:1px solid rgba(167,139,250,.25);transition:color .2s,border-color .2s}
  .ft a:hover{color:#fff;border-color:rgba(167,139,250,.6)}
  .ft-divider{margin:0 8px;opacity:.3}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
</style>
</head>
<body>
<div class="bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="grid"></div></div>
<div class="wrap">
  <header class="hd">
    <div class="hd-icon">🛡️</div>
    <div><h1>FaceBlur</h1><p>双引擎 AI · 一键模糊人脸 · 无限次使用</p></div>
    <div class="hd-tag"><span class="dot"></span>完全本地</div>
  </header>
  <div class="card upload" id="uploadBox">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="upload-circle">📷</div>
    <h3>拖放图片到此处</h3>
    <p class="sub">支持 JPG · PNG · WebP · 真人照片和插画均可</p>
    <span class="upload-cta">✦ 选择文件</span>
  </div>
  <div class="card settings">
    <div class="stitle">⚙ 设置</div>
    <div class="srow">
      <div class="fld">
        <div class="fld-label">模糊强度 <span class="tip-dot" data-t="数值越大模糊越强，推荐3-5">?</span></div>
        <input type="number" id="blurStrength" value="2" min="0.1" max="20" step="0.1">
      </div>
      <div class="fld">
        <div class="fld-label">模糊范围 <span class="tip-dot" data-t="人脸周围扩展区域 0-100">?</span></div>
        <input type="number" id="blurRange" value="0" min="0" max="100" step="1" placeholder="0 - 100">
        <div class="fld-hint">0 - 100</div>
      </div>
    </div>
  </div>
  <div class="bar"><button class="btn btn-go" id="startBtn" disabled>▶ 开始处理</button></div>
  <div class="st" id="statusBar"><div class="sp" id="spinner" style="display:none"></div><span id="statusText"></span></div>
  <div class="prog-wrap" id="progWrap">
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel"></div>
  </div>
  <div class="preview" id="previewSection">
    <div class="card pbox"><div class="pbox-hd">原图 <span id="faceBadge" class="tag-face"></span></div><img id="previewImg" alt="原图"></div>
    <div class="card pbox"><div class="pbox-hd">处理结果 <span id="doneBadge" class="tag-done"></span></div><canvas id="resultCanvas"></canvas></div>
  </div>
  <div class="result" id="resultActions">
    <button class="btn btn-dl" id="downloadBtn">⬇ 下载结果</button>
    <button class="btn btn-reset" id="resetBtn">↺ 重新上传</button>
  </div>
  <footer class="ft">
    <div>FaceBlur · 双引擎检测 (MediaPipe + SSD MobileNet) · 图片不上传服务器</div>
    <div>
      <a href="https://github.com/wmuj/renlianmohu" target="_blank" rel="noopener">⭐ GitHub 仓库</a>
      <span class="ft-divider">|</span>
      作者：<a href="https://github.com/wmuj" target="_blank" rel="noopener">码上全栈创享家</a>
      <span class="ft-divider">|</span>
      MIT License
    </div>
  </footer>
</div>

<script type="module">
import { FaceDetector, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

let mpDetector = null;   // MediaPipe detector
let fapiReady = false;   // face-api.js ready flag
let currentImages = [];
let currentZipBlob = null;

const $ = id => document.getElementById(id);
const uploadBox = $('uploadBox'), fileInput = $('fileInput'), startBtn = $('startBtn');
const downloadBtn = $('downloadBtn'), resetBtn = $('resetBtn');
const statusBar = $('statusBar'), statusText = $('statusText'), spinnerEl = $('spinner');
const previewSection = $('previewSection'), previewImg = $('previewImg');
const resultCanvas = $('resultCanvas'), faceBadge = $('faceBadge');
const doneBadge = $('doneBadge'), resultActions = $('resultActions');
const progWrap = $('progWrap'), progFill = $('progFill'), progLabel = $('progLabel');

// 进度条控制
function setProgress(current, total) {
  if (total <= 1) { progWrap.className = 'prog-wrap'; return; }
  const pct = Math.round((current / total) * 100);
  progWrap.className = 'prog-wrap show';
  progFill.style.width = pct + '%';
  progLabel.textContent = `${current} / ${total}  (${pct}%)`;
}
function hideProgress() { progWrap.className = 'prog-wrap'; }

function setStatus(type, text, showSp) {
  statusBar.className = 'st show ' + type;
  statusText.textContent = text;
  spinnerEl.style.display = showSp ? 'block' : 'none';
}
function hideStatus() { statusBar.className = 'st'; }

// ── Load BOTH engines ──
async function loadModels() {
  setStatus('loading', '正在加载双引擎人脸检测模型…', true);
  const promises = [];

  // Engine 1: MediaPipe BlazeFace (full range)
  promises.push((async () => {
    try {
      const fs = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      mpDetector = await FaceDetector.createFromOptions(fs, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
          delegate: 'GPU'
        },
        runningMode: 'IMAGE',
        minDetectionConfidence: 0.5
      });
      console.log('[Engine1] MediaPipe ready');
    } catch (e) {
      try {
        const fs = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
        );
        mpDetector = await FaceDetector.createFromOptions(fs, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite',
            delegate: 'CPU'
          },
          runningMode: 'IMAGE',
          minDetectionConfidence: 0.5
        });
        console.log('[Engine1] MediaPipe ready (CPU)');
      } catch (e2) {
        console.warn('[Engine1] MediaPipe failed:', e2);
      }
    }
  })());

  // Engine 2: face-api.js SSD MobileNet (local models)
  promises.push((async () => {
    try {
      await faceapi.nets.ssdMobilenetv1.loadFromUri('models');
      fapiReady = true;
      console.log('[Engine2] face-api.js SSD MobileNet ready');
    } catch (e) {
      console.warn('[Engine2] face-api.js failed:', e);
    }
  })());

  await Promise.all(promises);

  if (mpDetector || fapiReady) {
    const engines = [];
    if (mpDetector) engines.push('MediaPipe');
    if (fapiReady) engines.push('SSD MobileNet');
    setStatus('success', `✓ 已加载 ${engines.join(' + ')}`);
    setTimeout(hideStatus, 2500);
  } else {
    setStatus('error', '所有模型加载失败，请检查网络');
  }
}

// ── Detect faces using both engines, merge results ──
async function detectFaces(img) {
  const allBoxes = [];

  // Engine 1: MediaPipe
  if (mpDetector) {
    try {
      const r = mpDetector.detect(img);
      for (const d of r.detections) {
        const b = d.boundingBox;
        allBoxes.push({ x: b.originX, y: b.originY, w: b.width, h: b.height, score: d.categories[0]?.score || 0, engine: 'MP' });
      }
    } catch (e) { console.warn('MediaPipe detect error:', e); }
  }

  // Engine 2: face-api.js (more robust for diverse face types)
  if (fapiReady) {
    try {
      const detections = await faceapi.detectAllFaces(img, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }));
      for (const d of detections) {
        allBoxes.push({ x: d.box.x, y: d.box.y, w: d.box.width, h: d.box.height, score: d.score, engine: 'FA' });
      }
    } catch (e) { console.warn('face-api detect error:', e); }
  }

  // Deduplicate overlapping boxes (IoU > 0.4)
  const final = [];
  const used = new Set();
  // Sort by score descending
  allBoxes.sort((a, b) => b.score - a.score);
  for (let i = 0; i < allBoxes.length; i++) {
    if (used.has(i)) continue;
    final.push(allBoxes[i]);
    used.add(i);
    for (let j = i + 1; j < allBoxes.length; j++) {
      if (used.has(j)) continue;
      if (iou(allBoxes[i], allBoxes[j]) > 0.4) used.add(j);
    }
  }
  return final;
}

function iou(a, b) {
  const x1 = Math.max(a.x, b.x), y1 = Math.max(a.y, b.y);
  const x2 = Math.min(a.x + a.w, b.x + b.w), y2 = Math.min(a.y + a.h, b.y + b.h);
  if (x2 <= x1 || y2 <= y1) return 0;
  const inter = (x2 - x1) * (y2 - y1);
  const union = a.w * a.h + b.w * b.h - inter;
  return inter / union;
}

function handleFiles(files) {
  if (!files || files.length === 0) return;
  const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (validFiles.length === 0) { setStatus('error', '请选择图片文件'); return; }

  currentImages = [];
  currentZipBlob = null;
  let loaded = 0;

  faceBadge.textContent = ''; doneBadge.textContent = '';
  resultCanvas.getContext('2d').clearRect(0, 0, resultCanvas.width, resultCanvas.height);
  startBtn.disabled = true;
  resultActions.className = 'result';
  let processingFiles = validFiles;
  let limitWarning = false;
  if (processingFiles.length > 50) {
    processingFiles = processingFiles.slice(0, 50);
    limitWarning = true;
  }

  if (limitWarning) {
    setStatus('error', `⚠️ 为防止浏览器崩溃，单次首选前50张！正在读取…`, true);
  } else {
    setStatus('loading', `正在读取 ${processingFiles.length} 张图片…`, true);
  }

  processingFiles.forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      currentImages.push({ file, img, url, processedBlob: null, faceCount: 0 });
      loaded++;
      if (loaded === processingFiles.length) {
        previewImg.src = currentImages[0].url;
        const titleText = processingFiles.length > 1 ? `原图 (共${processingFiles.length}张)` : '原图';
        // 只更新文字节点，不重建 DOM，保留 faceBadge 引用有效性
        document.querySelector('.pbox-hd').firstChild.textContent = titleText + ' ';
        previewSection.className = 'preview show';
        startBtn.disabled = false;
        startBtn.textContent = processingFiles.length > 1 ? `▶ 批量处理 (${processingFiles.length})` : '▶ 开始处理';
        if (!limitWarning) {
          setStatus('success', `✓ 已选择 ${processingFiles.length} 张图片`);
          setTimeout(hideStatus, 2000);
        } else {
          setStatus('error', `⚠️ 已截断为前 50 张测试`);
        }
      }
    };
    img.src = url;
  });
}

fileInput.addEventListener('change', e => handleFiles(e.target.files));

// 拖拽闪烁修复：用计数器代替 dragenter/dragleave 简单切换
let dragCounter = 0;
uploadBox.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; uploadBox.classList.add('drag-over'); });
uploadBox.addEventListener('dragleave', () => { dragCounter--; if (dragCounter <= 0) { dragCounter = 0; uploadBox.classList.remove('drag-over'); } });
uploadBox.addEventListener('dragover', e => e.preventDefault());
uploadBox.addEventListener('drop', e => { e.preventDefault(); dragCounter = 0; uploadBox.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

resetBtn.addEventListener('click', () => {
  // 释放所有 Object URL，防止内存泄漏
  currentImages.forEach(item => { if (item.url) URL.revokeObjectURL(item.url); });
  currentImages = []; currentZipBlob = null; fileInput.value = '';
  previewSection.className = 'preview';
  startBtn.disabled = true; resultActions.className = 'result';
  document.querySelector('.pbox-hd').firstChild.textContent = '原图 ';
  faceBadge.textContent = '';
  startBtn.textContent = '▶ 开始处理';
  hideStatus(); hideProgress();
});

startBtn.addEventListener('click', async () => {
  if (currentImages.length === 0 || (!mpDetector && !fapiReady)) return;
  startBtn.disabled = true;

  const zip = new JSZip();
  let totalFaces = 0;
  const strength = Math.max(0.1, Math.min(20, parseFloat($('blurStrength').value) || 3));
  const range = Math.max(0, Math.min(100, parseInt($('blurRange').value) || 0));
  const blurPx = strength * 5;
  const padding = range / 100;
  const usedEngines = new Set();
  
  // ── 大图模糊优化：缩小→高斯滤波→放大，比重复 drawImage 快 ──
  function applyBlurToRegion(ctx, srcImage, bx, by, bw, bh, blurPx) {
    // 缩放因子：模糊半径越大，缩放比越低（最小 1/8）
    const scaleFactor = Math.max(1/8, Math.min(1, 16 / blurPx));
    const sw = Math.max(1, Math.round(bw * scaleFactor));
    const sh = Math.max(1, Math.round(bh * scaleFactor));
    // 把人脸区域缩小到临时 canvas
    const tmp = document.createElement('canvas');
    tmp.width = sw; tmp.height = sh;
    const tCtx = tmp.getContext('2d');
    tCtx.drawImage(srcImage, bx, by, bw, bh, 0, 0, sw, sh);
    // 在缩小后的尺寸上施加模糊（同等视觉效果，像素数更少）
    const blurOnSmall = blurPx * scaleFactor;
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(bx + bw / 2, by + bh / 2, bw / 2, bh / 2, 0, 0, Math.PI * 2);
    ctx.clip();
    ctx.filter = `blur(${blurOnSmall}px)`;
    // 把缩小后的模糊图放大回原始区域，获得自然的模糊效果
    ctx.drawImage(tmp, 0, 0, sw, sh, bx, by, bw, bh);
    ctx.filter = 'none';
    ctx.restore();
  }

  try {
    for (let i = 0; i < currentImages.length; i++) {
      const item = currentImages[i];
      const currentImage = item.img;
      const progressText = currentImages.length > 1 ? `(${i+1}/${currentImages.length}) ` : '';
      setStatus('loading', `正在处理 ${progressText}${item.file.name}…`, true);
      setProgress(i, currentImages.length);  // 更新进度条
      await new Promise(r => setTimeout(r, 60));

      const maxSize = 1024;
      let scale = 1;
      let detectImg = currentImage;
      if (currentImage.naturalWidth > maxSize || currentImage.naturalHeight > maxSize) {
        scale = Math.max(currentImage.naturalWidth / maxSize, currentImage.naturalHeight / maxSize);
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = Math.round(currentImage.naturalWidth / scale);
        tmpCanvas.height = Math.round(currentImage.naturalHeight / scale);
        const tCtx = tmpCanvas.getContext('2d');
        tCtx.drawImage(currentImage, 0, 0, tmpCanvas.width, tmpCanvas.height);
        detectImg = tmpCanvas;
      }

      const boxes = await detectFaces(detectImg);
      if (scale !== 1) {
        for (const box of boxes) {
          box.x *= scale; box.y *= scale; box.w *= scale; box.h *= scale;
        }
      }
      
      item.faceCount = boxes.length;
      totalFaces += item.faceCount;
      boxes.forEach(b => usedEngines.add(b.engine));

      const canvas = resultCanvas;
      const ctx = canvas.getContext('2d');
      canvas.width = currentImage.naturalWidth;
      canvas.height = currentImage.naturalHeight;
      ctx.drawImage(currentImage, 0, 0);

      if (item.faceCount > 0) {
        for (const box of boxes) {
          const px = box.w * padding, py = box.h * padding;
          const bx = Math.max(0, box.x - px), by = Math.max(0, box.y - py);
          const bw = Math.min(canvas.width - bx, box.w + px * 2);
          const bh = Math.min(canvas.height - by, box.h + py * 2);
          // 使用优化后的模糊算法
          applyBlurToRegion(ctx, currentImage, bx, by, bw, bh, blurPx);
        }
      }
      
      // 输出格式保留：PNG 图片输出 PNG（保留透明通道），其余输出 JPEG
      const isPng = item.file.type === 'image/png';
      const outMime = isPng ? 'image/png' : 'image/jpeg';
      const outQuality = isPng ? undefined : 0.92;
      const blob = await new Promise(resolve => canvas.toBlob(resolve, outMime, outQuality));
      item.processedBlob = blob;
      item.outExt = isPng ? 'png' : 'jpg';  // 保存扩展名供下载用
      
      if (currentImages.length === 1) {
        faceBadge.textContent = item.faceCount > 0 ? `${item.faceCount} 张人脸` : '未检测到人脸';
      }
      
      previewImg.src = item.url;
      setProgress(i + 1, currentImages.length);  // 完成一张，更新进度
    }

    if (currentImages.length > 1) {
      setStatus('loading', '正在打包带走...', true);
      await new Promise(r => setTimeout(r, 60));
      for (let idx = 0; idx < currentImages.length; idx++) {
        const item = currentImages[idx];
        const namePart = item.file.name.replace(/\.[^/.]+$/, '');
        const ext = item.outExt || 'jpg';  // 使用保存的扩展名
        zip.file(`${idx}_${namePart}_blurred.${ext}`, item.processedBlob);
      }
      currentZipBlob = await zip.generateAsync({ type: 'blob' });
      const enginesArr = [...usedEngines];
      const engineNames = enginesArr.map(e => e === 'MP' ? 'MediaPipe' : 'SSD').join('+');
      hideProgress();
      setStatus('success', `✓ 全部完成 (共处理 ${currentImages.length} 张，检出 ${totalFaces} 脸, via ${engineNames||'None'})`);
    } else {
      const enginesArr = [...usedEngines];
      const engineNames = enginesArr.map(e => e === 'MP' ? 'MediaPipe' : 'SSD').join('+');
      hideProgress();
      if (totalFaces === 0) {
        setStatus('error', '未检测到人脸，输出原图');
      } else {
        setStatus('success', `✓ 已模糊 ${totalFaces} 张人脸 (via ${engineNames})`);
      }
    }

    doneBadge.textContent = '✓ 完成';
    resultActions.className = 'result show';
    startBtn.disabled = false;
  } catch (err) {
    setStatus('error', '处理出错：' + err.message);
    startBtn.disabled = false;
  }
});

downloadBtn.addEventListener('click', () => {
  const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const link = document.createElement('a');
  
  if (currentImages.length === 1 && currentImages[0].processedBlob) {
    const ext = currentImages[0].outExt || 'jpg';  // 保留原格式扩展名
    link.download = `blurred_${ts}.${ext}`;
    link.href = URL.createObjectURL(currentImages[0].processedBlob);
  } else if (currentZipBlob) {
    link.download = `FaceBlur_Batch_${ts}.zip`;
    link.href = URL.createObjectURL(currentZipBlob);
  }
  
  if (link.href) {
    link.click();
    // 下载触发后释放临时 URL，防止内存泄漏
    setTimeout(() => URL.revokeObjectURL(link.href), 60000);
  }
});

loadModels();
</script>
